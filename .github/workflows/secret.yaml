name: Secret Workflow

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Use Secret safely
        env:
          MY_SECRET: ${{ secrets.SECRET }}
        run: |
          echo "The secret is successfully mapped to an env variable."
          # If you strictly want to see the masked output to verify it exists:
          echo "Masked secret: $MY_SECRET"
